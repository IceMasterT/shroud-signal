<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Shroud Signal Challenge</title>
    <link rel="modulepreload" href="challenge.js">
    <style>
    body {
      margin: 0;
      min-height: 100dvh;
      background: #05070c;
      color: #eef6ff;
      font-family: monospace;
      display: grid;
      place-items: center;
      box-sizing: border-box;
      padding: 2rem 1rem;
    }
    #root {
      width: 100%;
      max-width: 480px;
    }
    .panel {
      background: #0b0f16;
      border: 1px solid #2a3444;
      border-radius: 6px;
      padding: 1.5rem;
      display: grid;
      gap: 0.9rem;
      text-align: center;
    }
    h1 {
      font-size: 15px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #ff9500;
      margin: 0;
    }
    p {
      font-size: 13px;
      line-height: 1.5;
      color: #cdd8e6;
      margin: 0;
    }
    .stat {
      color: #ff9500;
    }
    button {
      font-family: monospace;
      font-size: 13px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #eef6ff;
      background: rgba(20, 26, 40, 0.75);
      border: 1px solid #ff9500;
      border-radius: 4px;
      padding: 0.7rem 1.2rem;
      cursor: pointer;
    }
    button:hover {
      background: rgba(255, 149, 0, 0.18);
    }
    button.secondary {
      border-color: #446688;
    }
    .row {
      display: flex;
      gap: 0.6rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .error {
      color: #ff5566;
    }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="panel"><p>Loading…</p></div>
    </div>
    <script src="challenge.js" type="module"></script>
  </body>
</html>
